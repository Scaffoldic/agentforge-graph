# AGENTFORGE-MANAGED: template:minimal@0.2.4 hash:6f314576dc1d
# NOTE: customized for agentforge-graph — deps + extras edited from the
# scaffold default. Managed-file upgrades will treat this as forked.
[project]
name = "agentforge-graph"
version = "0.0.0"
description = "Code Knowledge Graph (CKG) engine + agent toolset, built on AgentForge."
requires-python = ">=3.13"
dependencies = [
    # --- AgentForge framework (runtime + provider + serving) ---
    "agentforge-py",                       # core contracts + Agent runtime + CLI
    "agentforge-anthropic[anthropic]",     # LLM provider for enrichment (feat-010, feat-012)
    "agentforge-mcp",                      # MCP serving layer (feat-008)
    "python-dotenv>=1.0",
]

[project.optional-dependencies]
# Deterministic graph engine (feat-002/003/005/007). Heavy native wheels
# (pyarrow, onnxruntime) — installed as features land: `uv sync --extra engine`.
engine = [
    "tree-sitter>=0.23",                   # parsing core (feat-002)
    "tree-sitter-language-pack>=0.9",      # 100+ grammars incl. the v0.1 top-10 (feat-002)
    "kuzu>=0.6",                           # embedded graph store, default (feat-003 / ADR-0006)
    "lancedb>=0.15",                       # embedded vector store, default (feat-003)
    "fastembed>=0.4",                      # local embeddings, default (feat-005)
    "networkx>=3.3",                       # PageRank for the repo map (feat-007)
]
# Optional reranker (feat-006, OFF by default — pulls torch). `--extra rerank`.
rerank = ["agentforge-reranker-sentence-transformers"]
# Opt-in graph-store server backend (feat-003 / ADR-0006). `--extra neo4j`.
neo4j = ["agentforge-memory-neo4j"]
# Opt-in hosted embeddings (feat-005). `--extra voyage`.
voyage = ["agentforge-voyage"]
# Opt-in observability (OpenTelemetry tracing). `--extra otel`.
otel = ["agentforge-otel"]
# Test + lint toolchain.
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "pytest-cov>=5",
    "ruff>=0.7",
    "mypy>=1.13",
]

[project.scripts]
ckg = "agentforge_graph.main:main"             # primary CLI (feat-002/008: index, serve-mcp, …)
agentforge-graph = "agentforge_graph.main:main"

[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentforge_graph"]

[tool.ruff]
line-length = 100
target-version = "py313"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.mypy]
python_version = "3.13"
strict = true
files = ["src"]
plugins = ["pydantic.mypy"]

# Native engine deps ship no type stubs; keep our own code strict by
# ignoring only the missing third-party imports at the boundary.
[[tool.mypy.overrides]]
module = ["kuzu.*", "lancedb.*", "pyarrow.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "--cov=agentforge_graph --cov-report=term-missing --cov-fail-under=90"

[tool.coverage.run]
# main.py is the AGENTFORGE-managed scaffold CLI: it drives a live `Agent`
# (an LLM call), so it can't be unit-tested. It's rewritten into real,
# testable `ckg` subcommands by feat-002 (index) and feat-008 (serve-mcp);
# drop this omit when those land.
omit = ["src/agentforge_graph/main.py"]
