name: Feature request
description: Suggest a capability or improvement for agentforge-graph
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Larger features may need a `feat-NNN` / `ENH-NNN`
        spec under `docs/features/` before implementation — a maintainer will
        guide you. Check [docs/features/TRACKER.md](../blob/main/docs/features/TRACKER.md)
        to see if it's already planned.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case and the pain, not just the proposed API.
      placeholder: When indexing my repos for an agent, I need ... because ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should the engine/CLI do? Sketch the config or command if you have one.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, or how you work around it today.
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the engine does this touch?
      options:
        - Ingestion / parsing (tree-sitter packs)
        - Graph schema / storage
        - Retrieval / reranking
        - Framework packs (routes / models / services)
        - Cross-file / cross-service resolution
        - Repo map / summaries
        - Enrichment (LLM tags / summaries)
        - MCP serving / tools
        - Workspace / build / config
        - CLI
        - Other / not sure
    validations:
      required: false
