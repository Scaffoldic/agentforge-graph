version: 2
updates:
  # Keep GitHub Actions in the CI / release workflows current.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    labels:
      - "dependencies"
      - "ci"

  # Python dependencies (uv reads standard pyproject.toml metadata, which
  # Dependabot's pip ecosystem understands).
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
    labels:
      - "dependencies"
