# agentforge-graph engine config — read by the agentforge_graph package
# (NOT by the AgentForge framework; see agentforge.yaml for framework config).
#
# This is the starting config; each feature's full schema lands with the
# feature (see docs/features/). Keys map to ADRs/specs as noted.

store:                          # feat-003 / ADR-0006 — embedded-first, pluggable
  path: ".ckg"                  # gitignored index dir at repo root
  graph:
    driver: "kuzu"              # default embedded graph store; opt-in: neo4j
    config: {}
  vectors:
    driver: "lancedb"           # default embedded vector store
    config: {}

ingest:                         # feat-002 / ADR-0009 — top-10 languages, A/B tiers
  languages: auto               # auto-detect; packs: py, ts, js, java, go, c#, rust, ruby, php, c++
  exclude:
    - "**/node_modules/**"
    - "**/.venv/**"
    - "**/dist/**"
    - "**/.git/**"
  max_file_kb: 512
  lsp_assist: off               # opt-in resolution escalation (Tier B / C++)
  incremental: on               # feat-004 — re-index only the diff once indexed (--full overrides)
  resolve_scope_hops: 1         # import-graph hops to re-resolve around a changed file

chunking:                       # feat-005 / ADR-0007 — AST-aware (cAST)
  max_tokens: 512
  min_tokens: 64

embed:                          # feat-005 — AWS Bedrock (Cohere embed-v4)
  driver: "bedrock"             # bedrock | fake  (fastembed/voyage are later drivers)
  model: "cohere.embed-v4:0"
  region: "us-east-1"
  dim: 1024
  batch_size: 96
  assume_role_arn: ""           # set for CI (OIDC assume-role); empty = default AWS creds

retrieve:                       # feat-006 / ADR-0008 — hybrid (vector -> graph)
  k: 8
  depth: 1
  decay: 0.6
  fanout_cap: 25                # max neighbors expanded per hop (overflow noted)
  rerank: off                   # off | <reranker ref> (concrete reranker is post-0.1)
  edge_weights:                 # provenance-weighted scoring (ADR-0004)
    resolved: 1.0
    manual: 0.8
    parsed: 0.5
    llm: 0.3

repomap:                        # feat-007 — Aider-style PageRank repo map
  default_budget: 2000
  damping: 0.85
  kinds: ["Class", "Function", "Method"]

serve:                          # feat-008 — MCP guardrails
  max_depth: 3
  max_k: 50
  response_token_cap: 6000
  refresh_on_call: off

frameworks:                     # feat-011 — framework-aware extractors
  enabled: auto                 # auto-detect per repo | off | explicit list e.g. ["fastapi"]
  packs: []                     # force-enable specific packs regardless of detection

# Higher-layer features — config lands when the feature ships:
# temporal:   (feat-009)   enabled, history_backfill, retention_commits
# knowledge:  (feat-010)   adr_globs, doc_globs, commit_messages, infer_governs
# enrich:     (feat-012)   model, summaries, patterns, budget_usd
