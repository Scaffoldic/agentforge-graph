# agentforge-graph engine config — read by the agentforge_graph package
# (NOT by the AgentForge framework; see agentforge.yaml for framework config).
#
# This is the starting config; each feature's full schema lands with the
# feature (see docs/features/). Keys map to ADRs/specs as noted.

store:                          # feat-003 / ADR-0006 — embedded-first, pluggable
  path: ".ckg"                  # gitignored index dir at repo root
  graph:
    driver: "kuzu"              # default embedded graph store
    config: {}
    # Server backend (ENH-004): pip install agentforge-graph[neo4j]
    # driver: "neo4j"
    # config: { uri: "bolt://localhost:7687", user: "neo4j" }  # password: $CKG_NEO4J_PASSWORD
  vectors:
    driver: "lancedb"           # default embedded vector store
    config: {}
    # Server backend (ENH-004): pip install agentforge-graph[pgvector]
    # driver: "pgvector"
    # config: { dsn: "postgresql://user@localhost:5432/ckg" }  # or $CKG_PGVECTOR_DSN

ingest:                         # feat-002 / ADR-0009 — top-10 languages, A/B tiers
  languages: auto               # auto-detect; packs: py, ts, js, java, go, c#, rust, ruby, php, c++
  exclude:
    - "**/node_modules/**"
    - "**/.venv/**"
    - "**/dist/**"
    - "**/.git/**"
  max_file_kb: 512
  lsp_assist: off               # opt-in resolution escalation (Tier B / C++)
  incremental: on               # feat-004 — re-index only the diff once indexed (--full overrides)
  resolve_scope_hops: 1         # import-graph hops to re-resolve around a changed file

chunking:                       # feat-005 / ADR-0007 — AST-aware (cAST)
  max_tokens: 512
  min_tokens: 64

embed:                          # feat-005 — embeddings (default: Bedrock Cohere embed-v4)
  driver: "bedrock"             # bedrock | openai | fake | <entry-point> (ENH-003 registry)
  model: "cohere.embed-v4:0"    # openai: e.g. text-embedding-3-small
  region: "us-east-1"           # bedrock only
  dim: 1024                     # openai 3-* models accept arbitrary output dims
  batch_size: 96
  assume_role_arn: ""           # bedrock: set for CI (OIDC assume-role); empty = default AWS creds
  base_url: ""                  # openai: OpenAI-compatible endpoint, incl. local (Ollama/vLLM/LM Studio)
  api_key_env: ""               # openai: env var holding the key (empty = OPENAI_API_KEY)

retrieve:                       # feat-006 / ADR-0008 — hybrid (vector -> graph)
  k: 8
  depth: 1
  decay: 0.6
  fanout_cap: 25                # max neighbors expanded per hop (overflow noted)
  rerank: off                   # ENH-009: off | lexical (opt-in subtoken blend; helps keyword/symbol queries)
  rerank_weight: 0.5            # lexical: final = (1-w)*cosine + w*subtoken-overlap
  edge_weights:                 # provenance-weighted scoring (ADR-0004)
    resolved: 1.0
    manual: 0.8
    parsed: 0.5
    llm: 0.3

repomap:                        # feat-007 — Aider-style PageRank repo map
  default_budget: 2000
  damping: 0.85
  kinds: ["Class", "Function", "Method"]

serve:                          # feat-008 — MCP server + guardrails
  transport: "stdio"            # stdio (subprocess) | http (streamable-HTTP at /mcp); CLI --transport overrides
  host: "127.0.0.1"             # http transport bind host
  port: 8765                    # http transport port
  http_auth_token: ""           # ENH-005: http bearer token (empty = no auth, localhost). Prefer $CKG_HTTP_AUTH_TOKEN
  max_depth: 3
  max_k: 50
  response_token_cap: 6000
  refresh_on_call: off

frameworks:                     # feat-011 — framework-aware extractors
  enabled: auto                 # auto-detect per repo | off | explicit list e.g. ["fastapi"]
  packs: []                     # force-enable specific packs regardless of detection

knowledge:                      # feat-010 — ADR & docs ingestion
  enabled: on                   # parse ADRs → Decision nodes + GOVERNS edges
  adr_globs:                    # where decision records live
    - "docs/adr/**/*.md"
    - "docs/decisions/**/*.md"
  # follow-ups (declared, inert at MVP):
  doc_globs: []                 # general docs → DocChunks + DESCRIBES
  commit_messages: off          # ingest commit messages as DocChunks
  infer_governs: off            # LLM matcher for decisions with no parsed links
  infer_budget_usd: 1.0

enrich:                         # feat-012 — LLM enrichment (pattern tagging)
  enabled: on                   # never runs implicitly — `ckg enrich` only
  provider: "bedrock"           # ENH-003: bedrock | anthropic | scripted | <entry-point>; selects judge+summarizer
  model: "us.anthropic.claude-haiku-4-5-20251001-v1:0"  # Bedrock profile; anthropic provider normalises to the API id
  region: "us-east-1"           # bedrock only
  assume_role_arn: ""           # bedrock: set for CI (OIDC assume-role); empty = default AWS creds
  base_url: ""                  # anthropic: Anthropic-compatible endpoint (empty = default)
  api_key_env: ""               # anthropic: env var holding the key (empty = ANTHROPIC_API_KEY)
  budget_usd: 2.0               # per-run LLM judge cap (breaker)
  confidence_floor: 0.7         # drop tags below this confidence
  taxonomy: v1
  patterns_recall: conservative # conservative | broad (ENH-001 — broad = higher recall, more judge calls)
  concurrency: 6                # in-flight LLM calls per enrich run (ENH-002)
  summary_max_words: 120        # module summaries
  summary_levels: ["file", "repo"]

temporal:                       # feat-009 — git-evolution layer (OPT-IN, default off)
  enabled: false                # on + git repo → record symbol lifecycle to .ckg/temporal.db
  history_backfill: 0           # commits to replay at first index (0 = accrue from adoption)
  retention_commits: 1000       # prune closed events beyond this horizon
  rename_detection: "file"      # file (exact git renames) | signature (intra-file, best-effort)
